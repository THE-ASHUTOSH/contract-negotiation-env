name: contract-negotiation-env
version: "1.0.0"
description: >
  Autonomous contract negotiation environment. An LLM agent identifies
  conflicting clauses between vendor and client contracts, proposes
  compromise language, and produces a merged final agreement.
author: Ashutosh Kumar
tags: [contract, negotiation, legal, multi-step-reasoning, llm-agent]

environment:
  type: http
  action_space: ContractAction
  observation_space: ContractObservation
  state_space: ContractState

tasks:
  - id: task_easy
    name: Clause Conflict Identification
    difficulty: easy
    max_steps: 5
    reward_range: [0.0, 1.0]
  - id: task_medium
    name: Compromise Language Proposal
    difficulty: medium
    max_steps: 8
    reward_range: [0.0, 1.0]
  - id: task_hard
    name: Full Autonomous Contract Merger
    difficulty: hard
    max_steps: 12
    reward_range: [0.0, 1.0]

server:
  port: 8000
  health_endpoint: /health
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
